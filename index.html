<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>NMAI - Object Detection</title>
    <style>
        body { background: #0a0e1a; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { border-bottom: 1px solid #1f2a45; padding-bottom: 20px; margin-bottom: 20px; }
        .title { font-size: 24px; font-weight: bold; color: #f7d000; }
        .panel { background: #111827; padding: 20px; border-radius: 12px; border: 1px solid #1f2a45; }
        .btn { background: #22c55e; color: #000; border: none; padding: 10px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .btn:hover { opacity: 0.8; }
        .canvas-container { position: relative; margin-top: 20px; width: 100%; max-width: 800px; background: #000; border-radius: 8px; overflow: hidden; }
        img { display: block; width: 100%; height: auto; }
        .box { position: absolute; border: 2px solid #22c55e; box-sizing: border-box; background: rgba(34, 197, 94, 0.1); }
        .label { position: absolute; top: -18px; left: -2px; background: #22c55e; color: #000; font-size: 11px; font-weight: bold; padding: 2px 4px; white-space: nowrap; z-index: 10; }
        .stats { display: flex; gap: 20px; margin-top: 10px; font-size: 14px; color: #94a3b8; }
        .stat-val { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">NorgesGruppen - Live YOLO11x Test</div>
        <div style="color: #6b7ab8; font-size: 14px; margin-top: 5px;">Tester den ferdigtrente modellen (best.pt) direkte på Macen din</div>
    </div>
    
    <div class="panel">
        <input type="file" id="fileInput" accept="image/*" style="margin-bottom: 15px; display: block; color: #fff;">
        <button class="btn" id="analyzeBtn">Kjør Inferens (1280px)</button>
        
        <div class="stats" id="statsRow" style="display: none;">
            <div>Produkter: <span class="stat-val" id="statCount">0</span></div>
            <div>Mac Inferenstid: <span class="stat-val" id="statTime">-</span></div>
        </div>

        <div class="canvas-container" id="canvasContainer">
            <img id="imagePreview" style="display:none;">
            <div id="boxesContainer"></div>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const imagePreview = document.getElementById('imagePreview');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const boxesContainer = document.getElementById('boxesContainer');
    
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const url = URL.createObjectURL(file);
        imagePreview.src = url;
        imagePreview.style.display = 'block';
        boxesContainer.innerHTML = '';
        document.getElementById('statsRow').style.display = 'none';
    });
    
    analyzeBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) { alert('Velg et bilde fra datasettet først!'); return; }
        
        analyzeBtn.textContent = 'Modellen tenker...';
        boxesContainer.innerHTML = '';
        
        const formData = new FormData();
        formData.append('file', file);
        
        try {
            const res = await fetch('http://127.0.0.1:8080/predict', { 
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            
            data.boxes.forEach(b => {
                const box = document.createElement('div');
                box.className = 'box';
                box.style.left = b.x + '%';
                box.style.top = b.y + '%';
                box.style.width = b.w + '%';
                box.style.height = b.h + '%';
                
                const label = document.createElement('div');
                label.className = 'label';
                label.textContent = `${b.class} ${b.conf}`;
                
                box.appendChild(label);
                boxesContainer.appendChild(box);
            });
            
            document.getElementById('statsRow').style.display = 'flex';
            document.getElementById('statCount').textContent = data.boxes.length;
            document.getElementById('statTime').textContent = data.time;
            
        } catch (e) {
            alert('Feil ved inferens: ' + e);
        } finally {
            analyzeBtn.textContent = 'Kjør Inferens (1280px)';
        }
    });
</script>
</body>
</html>
